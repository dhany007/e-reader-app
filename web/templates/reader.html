{{define "reader.html"}}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.book.Title}} — aksara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Merriweather:ital,wght@0,300;0,400;1,300&family=Inter:wght@400;600&family=Nunito:wght@400;600&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        .font-default  { font-family: system-ui, sans-serif; }
        .font-lora     { font-family: 'Lora', serif; }
        .font-merri    { font-family: 'Merriweather', serif; }
        .font-inter    { font-family: 'Inter', sans-serif; }
        .font-nunito   { font-family: 'Nunito', sans-serif; }
        .font-source   { font-family: 'Source Serif 4', serif; }

        #font-menu {
            position: absolute;
            right: 0; top: calc(100% + 6px);
            background: var(--btn-bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.35rem;
            min-width: 160px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            z-index: 50;
        }
        #font-menu button {
            display: block; width: 100%;
            padding: 0.45rem 0.75rem;
            border-radius: 0.35rem;
            text-align: left; font-size: 0.875rem;
            color: var(--text);
            transition: background 0.1s;
        }
        #font-menu button:hover { background: var(--btn-hover); }
        #font-menu button.active { color: #60a5fa; font-weight: 600; }
        :root {
            --bg:              #030712;
            --bg-header:       rgba(3,7,18,0.92);
            --border:          #1f2937;
            --text:            #d1d5db;
            --text-heading:    #f3f4f6;
            --text-sub:        #9ca3af;
            --text-muted:      #6b7280;
            --btn-bg:          #1f2937;
            --btn-hover:       #374151;
            --btn-text:        #d1d5db;
            --code-bg:         #0d1117;
            --code-border:     #30363d;
            --code-color:      #79c0ff;
            --inline-code-bg:  #161b22;
            --blockquote-bd:   #374151;
            --blockquote-text: #6b7280;
            --divider:         #1f2937;
        }
        body.light {
            --bg:              #faf7f2;
            --bg-header:       rgba(250,247,242,0.95);
            --border:          #e5e7eb;
            --text:            #374151;
            --text-heading:    #111827;
            --text-sub:        #4b5563;
            --text-muted:      #9ca3af;
            --btn-bg:          #e5e7eb;
            --btn-hover:       #d1d5db;
            --btn-text:        #374151;
            --code-bg:         #f3f4f6;
            --code-border:     #e5e7eb;
            --code-color:      #0550ae;
            --inline-code-bg:  #f3f4f6;
            --blockquote-bd:   #d1d5db;
            --blockquote-text: #6b7280;
            --divider:         #e5e7eb;
        }

        body {
            font-size: var(--font-size, 1rem);
            background: var(--bg);
            color: var(--text);
            transition: background 0.2s, color 0.2s;
        }
        .reader-header {
            background: var(--bg-header);
            border-bottom-color: var(--border);
        }
        .icon-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            transition: background 0.15s;
        }
        .icon-btn:hover { background: var(--btn-hover); }

        /* Prose */
        .prose h1 {
            font-size: 1.6em; font-weight: 700;
            margin: 2.5rem 0 1.25rem;
            text-align: center;
            color: var(--text-heading);
            letter-spacing: 0.02em;
        }
        .prose h2 {
            font-size: 1.3em; font-weight: 700;
            margin: 3rem 0 1.25rem;
            text-align: center;
            color: var(--text-heading);
            letter-spacing: 0.04em;
        }
        .prose h3 {
            font-size: 1.1em; font-weight: 600;
            margin: 1.75rem 0 0.75rem;
            color: var(--text-sub);
        }
        .prose p {
            margin: 0 0 1.1rem;
            line-height: 1.9;
            color: var(--text);
            text-align: justify;
            hyphens: auto;
        }
        .prose pre {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
            margin: 1.1rem 0;
        }
        .prose pre code {
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.85em;
            color: var(--code-color);
            white-space: pre;
        }
        .prose code:not(pre code) {
            background: var(--inline-code-bg);
            padding: 0.15em 0.4em;
            border-radius: 0.25rem;
            font-size: 0.875em;
            color: var(--code-color);
        }
        .prose ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: var(--text); }
        .prose ol { list-style: decimal; padding-left: 1.5rem; margin-bottom: 1rem; color: var(--text); }
        .prose li { margin-bottom: 0.3rem; line-height: 1.75; }
        .prose strong { color: var(--text-heading); }
        .prose blockquote {
            border-left: 3px solid var(--blockquote-bd);
            padding-left: 1rem;
            color: var(--blockquote-text);
            margin: 1rem 0;
            font-style: italic;
        }
        .page-divider { border-color: var(--divider); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="reader-header sticky top-0 z-10 backdrop-blur border-b px-3 sm:px-5 py-3 flex items-center gap-2">
        <a href="/library" class="shrink-0 transition p-1 -ml-1" style="color:var(--text-muted);"
           onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-muted)'"
           aria-label="Kembali">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </a>
        <div class="flex-1 min-w-0">
            <div class="text-sm font-medium truncate" style="color:var(--text-heading);">{{.book.Title}}</div>
            <div id="page-indicator" class="text-xs mt-0.5" style="color:var(--text-muted);"></div>
        </div>
        <div class="flex items-center gap-1 shrink-0">
            <button id="font-down" class="icon-btn w-8 h-8 flex items-center justify-center rounded-lg text-sm" title="Perkecil teks">A−</button>
            <button id="font-up"   class="icon-btn w-8 h-8 flex items-center justify-center rounded-lg text-sm" title="Perbesar teks">A+</button>
            <!-- Font picker -->
            <div class="relative">
                <button id="font-btn" class="icon-btn h-8 px-2 flex items-center gap-1 rounded-lg text-xs font-medium" title="Ganti font">
                    <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h10M4 18h7"/>
                    </svg>
                    <span id="font-label">Sans</span>
                </button>
                <div id="font-menu" class="hidden">
                    <button data-font="font-default" data-label="Sans">System Sans</button>
                    <button data-font="font-inter"   data-label="Inter">Inter</button>
                    <button data-font="font-nunito"  data-label="Nunito">Nunito</button>
                    <button data-font="font-lora"    data-label="Lora">Lora (Serif)</button>
                    <button data-font="font-source"  data-label="Source">Source Serif</button>
                    <button data-font="font-merri"   data-label="Merri">Merriweather</button>
                </div>
            </div>
            <!-- Dark/Light toggle -->
            <button id="theme-toggle" class="icon-btn w-8 h-8 flex items-center justify-center rounded-lg" title="Ganti tema">
                <!-- moon = dark mode active -->
                <svg id="icon-moon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
                </svg>
                <!-- sun = light mode active -->
                <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.07l-.7.7M6.34 17.66l-.7.7m12.02 0l-.7-.7M6.34 6.34l-.7-.7M12 7a5 5 0 100 10A5 5 0 0012 7z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Content -->
    <main class="max-w-2xl mx-auto px-4 sm:px-6 py-8 pb-24">
        <div id="content" class="prose"></div>
        <div id="loader" class="hidden text-center py-10">
            <div class="inline-block w-6 h-6 border-2 rounded-full animate-spin" style="border-color:var(--border);border-top-color:#3b82f6;"></div>
        </div>
        <div id="end-msg" class="hidden text-center text-sm py-10 tracking-wide" style="color:var(--text-muted);">— Selesai —</div>
    </main>

    <!-- Scroll to top -->
    <button id="scroll-top"
        class="icon-btn hidden fixed bottom-6 right-4 sm:right-6 w-10 h-10 border rounded-full shadow-lg flex items-center justify-center transition z-20"
        style="border-color:var(--border);"
        title="Ke atas" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
        </svg>
    </button>

    <script>
    const BOOK_ID = {{.book.ID}};
    const TOTAL   = {{.book.TotalPages}};
    let current = 0;
    let loading = false;
    let progressRestored = false;
    let savedScrollY = 0;

    // --- Font picker ---
    const FONTS = [
        { cls: 'font-default', label: 'Sans' },
        { cls: 'font-inter',   label: 'Inter' },
        { cls: 'font-nunito',  label: 'Nunito' },
        { cls: 'font-lora',    label: 'Lora' },
        { cls: 'font-source',  label: 'Source' },
        { cls: 'font-merri',   label: 'Merri' },
    ];
    const fontClasses = FONTS.map(f => f.cls);
    let currentFont = localStorage.getItem('reader-font') || 'font-default';

    function applyFontClass() {
        document.body.classList.remove(...fontClasses);
        document.body.classList.add(currentFont);
        const f = FONTS.find(f => f.cls === currentFont);
        document.getElementById('font-label').textContent = f ? f.label : 'Sans';
        document.querySelectorAll('#font-menu button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.font === currentFont);
        });
        localStorage.setItem('reader-font', currentFont);
    }
    applyFontClass();

    const fontBtn  = document.getElementById('font-btn');
    const fontMenu = document.getElementById('font-menu');
    fontBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        fontMenu.classList.toggle('hidden');
    });
    fontMenu.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-font]');
        if (!btn) return;
        currentFont = btn.dataset.font;
        applyFontClass();
        fontMenu.classList.add('hidden');
    });
    document.addEventListener('click', () => fontMenu.classList.add('hidden'));

    // --- Theme ---
    let isLight = localStorage.getItem('reader-theme') === 'light';
    function applyTheme() {
        document.body.classList.toggle('light', isLight);
        document.getElementById('icon-moon').classList.toggle('hidden', isLight);
        document.getElementById('icon-sun').classList.toggle('hidden', !isLight);
        localStorage.setItem('reader-theme', isLight ? 'light' : 'dark');
    }
    applyTheme();
    document.getElementById('theme-toggle').addEventListener('click', () => {
        isLight = !isLight;
        applyTheme();
    });

    // --- Font size ---
    const SIZES = [0.85, 0.95, 1, 1.1, 1.2, 1.35];
    let sizeIdx = parseInt(localStorage.getItem('reader-font-idx') || '2', 10);
    const applyFont = () => {
        document.documentElement.style.setProperty('--font-size', SIZES[sizeIdx] + 'rem');
        localStorage.setItem('reader-font-idx', sizeIdx);
    };
    applyFont();
    document.getElementById('font-down').addEventListener('click', () => {
        if (sizeIdx > 0) { sizeIdx--; applyFont(); }
    });
    document.getElementById('font-up').addEventListener('click', () => {
        if (sizeIdx < SIZES.length - 1) { sizeIdx++; applyFont(); }
    });

    // --- Page loading ---
    async function loadPage(num) {
        if (num < 1 || num > TOTAL || loading) return;
        loading = true;
        document.getElementById('loader').classList.remove('hidden');

        try {
            const res = await fetch(`/books/${BOOK_ID}/pages/${num}`);
            if (res.ok) {
                const data = await res.json();
                current = num;
                if (data.html) {
                    const div = document.createElement('div');
                    div.className = 'mb-6 pb-6 border-b page-divider last:border-0';
                    div.dataset.page = num;
                    div.innerHTML = data.html;
                    document.getElementById('content').appendChild(div);
                    updateIndicator();

                    if (!progressRestored && savedScrollY > 0) {
                        progressRestored = true;
                        window.scrollTo({ top: savedScrollY, behavior: 'instant' });
                    }
                }

                if (num >= TOTAL) {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('end-msg').classList.remove('hidden');
                } else if (!data.html) {
                    loading = false;
                    document.getElementById('loader').classList.add('hidden');
                    await loadPage(num + 1);
                    return;
                }
            } else {
                document.getElementById('content').innerHTML =
                    '<p style="color:#f87171;text-align:center;padding:5rem 0;font-size:0.875rem;">Gagal memuat konten buku. Coba refresh halaman.</p>';
            }
        } finally {
            loading = false;
            document.getElementById('loader').classList.add('hidden');
        }
    }

    function updateIndicator() {
        if (TOTAL > 0) {
            document.getElementById('page-indicator').textContent = `${current} / ${TOTAL} halaman`;
        }
    }

    async function restoreProgress() {
        const coverImg = document.createElement('img');
        coverImg.src = `/books/${BOOK_ID}/cover`;
        coverImg.alt = 'Sampul';
        coverImg.className = 'w-full max-w-xs mx-auto rounded-lg shadow-lg block mb-8';
        coverImg.onerror = () => coverWrap.remove();
        const coverWrap = document.createElement('div');
        coverWrap.className = 'flex justify-center mb-6 pb-6 border-b page-divider';
        coverWrap.appendChild(coverImg);
        document.getElementById('content').appendChild(coverWrap);

        if (TOTAL === 0) {
            const msg = document.createElement('div');
            msg.className = 'text-center py-20';
            msg.innerHTML =
                `<p style="color:var(--text-muted);font-size:0.875rem;margin-bottom:1rem;">Buku ini tidak memiliki konten yang dapat dibaca.<br>PDF mungkin berupa gambar hasil scan tanpa teks.</p>` +
                `<a href="/library" style="color:#60a5fa;font-size:0.875rem;">← Kembali ke perpustakaan</a>`;
            document.getElementById('content').appendChild(msg);
            return;
        }
        try {
            const res = await fetch(`/books/${BOOK_ID}/progress`);
            if (res.ok) {
                const data = await res.json();
                if (data.scroll_pct > 0) {
                    savedScrollY = data.scroll_pct * (document.documentElement.scrollHeight - window.innerHeight);
                }
            }
        } catch (_) {}
        await loadPage(1);
        if (savedScrollY === 0) progressRestored = true;
    }

    // --- Scroll events ---
    const scrollTopBtn = document.getElementById('scroll-top');
    let saveTimer;

    window.addEventListener('scroll', () => {
        const scrollY   = window.scrollY;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;

        if (document.documentElement.scrollHeight - scrollY - window.innerHeight < 600 && !loading && current < TOTAL) {
            loadPage(current + 1);
        }

        scrollTopBtn.classList.toggle('hidden', scrollY < 400);
        scrollTopBtn.classList.toggle('flex', scrollY >= 400);

        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
            const pct = scrollY / Math.max(1, maxScroll);
            fetch(`/books/${BOOK_ID}/progress`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scroll_pct: pct })
            });
        }, 2000);
    });

    restoreProgress();
    </script>
</body>
</html>
{{end}}

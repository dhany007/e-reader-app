{{define "login.html"}}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reader — Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">AI Reader</h1>
            <p class="text-gray-500 text-sm mt-1">Baca buku dalam Bahasa Indonesia</p>
        </div>
        {{if .error}}
        <div class="bg-red-900/40 border border-red-700 text-red-300 text-sm px-4 py-3 rounded-lg mb-4">
            Username atau password salah.
        </div>
        {{end}}
        <form method="POST" action="/login" class="space-y-3">
            <input name="username" type="text" placeholder="Username" autocomplete="username"
                class="w-full bg-gray-800 text-white px-4 py-3 rounded-lg border border-gray-700 focus:outline-none focus:border-blue-500 transition placeholder-gray-500" required>
            <input name="password" type="password" placeholder="Password" autocomplete="current-password"
                class="w-full bg-gray-800 text-white px-4 py-3 rounded-lg border border-gray-700 focus:outline-none focus:border-blue-500 transition placeholder-gray-500" required>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-medium py-3 rounded-lg transition">
                Masuk
            </button>
        </form>
    </div>
</body>
</html>
{{end}}
